<div class="shell">
  <div class="screen no-nav auth">
    <a class="auth-back" routerLink="/bienvenue"><i class="ti ti-arrow-left"></i> Se connecter</a>

    <h1 class="auth-title wm">Re-bonjour</h1>
    <p class="auth-sub">Connecte-toi pour rejoindre une session.</p>

    <form class="form" [formGroup]="form" (ngSubmit)="submit()">
      <div>
        <div class="field">Nom d'utilisateur ou téléphone</div>
        <div class="input-icon">
          <i class="ti ti-user"></i>
          <input formControlName="identifiant" placeholder="@kevin_mba" autocomplete="username" />
        </div>
      </div>
      <div>
        <div class="field">Mot de passe</div>
        <div class="input-icon">
          <i class="ti ti-lock"></i>
          <input
            formControlName="motDePasse"
            type="password"
            placeholder="••••••••"
            autocomplete="current-password"
          />
        </div>
      </div>

      <div class="forgot"><span class="link">Mot de passe oublié ?</span></div>

      @if (error()) {
        <p class="error-text">{{ error() }}</p>
      }

      <button class="btn btn-gold spacer" type="submit" [disabled]="loading()">
        @if (loading()) {
          <span class="spinner"></span>
        } @else {
          Se connecter
        }
      </button>
    </form>

    <p class="switch">Pas encore de compte ? <a class="link" routerLink="/inscription">Créer un compte</a></p>
  </div>
</div>
