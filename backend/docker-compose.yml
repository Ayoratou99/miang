name: miang

# Full stack (prod-like). Dev hot-reload: docker-compose.override.yml is merged
# automatically by `docker compose up`. Prod: `docker compose -f docker-compose.yml up -d`.
x-app-env: &app-env
  NODE_ENV: ${NODE_ENV:-production}
  API_PORT: '3000'
  CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:4200}
  DATABASE_URL: postgresql://${POSTGRES_USER:-miang}:${POSTGRES_PASSWORD:-miang}@postgres:5432/${POSTGRES_DB:-miang}?schema=public
  REDIS_URL: redis://redis:6379
  JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev_access_secret_change_me}
  JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_refresh_secret_change_me}
  OTP_PROVIDER: ${OTP_PROVIDER:-console}
  MOBILE_MONEY_PROVIDER: ${MOBILE_MONEY_PROVIDER:-stub}
  PAYMENTS_WEBHOOK_SECRET: ${PAYMENTS_WEBHOOK_SECRET:-dev_webhook_secret}
  VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
  VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
  VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:ops@miang.ga}
  DRAW_CRON: ${DRAW_CRON:-0 0 * * *}

services:
  migrate:
    build:
      context: .
      target: builder
    command: npx prisma migrate deploy
    environment:
      <<: *app-env
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  api:
    build:
      context: .
      target: runtime
    command: node dist/main.js
    environment:
      <<: *app-env
      ROLE: api
    ports:
      - '${API_PORT:-3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        ['CMD', 'node', '-e', "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
    restart: unless-stopped

  worker:
    build:
      context: .
      target: runtime
    command: node dist/worker.js
    environment:
      <<: *app-env
      ROLE: worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-miang}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-miang}
      POSTGRES_DB: ${POSTGRES_DB:-miang}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER:-miang} -d $${POSTGRES_DB:-miang}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redisdata:/data
    ports:
      - '${REDIS_PORT:-6379}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  adminer:
    image: adminer:latest
    ports:
      - '8080:8080'
    depends_on:
      - postgres
    profiles: ['tools']
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
